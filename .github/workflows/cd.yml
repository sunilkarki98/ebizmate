name: CD Pipeline (Hetzner VM)

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: ["main"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    # Only deploy if CI succeeded AND it was a push (not a PR)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    steps:
      - name: Execute Remote Deployment Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/ebizmate

            # Pull latest changes from git
            git pull origin main

            # Run database migrations before rebuilding
            docker compose -f docker-compose.prod.yml run --rm ebizmate-api \
              npx turbo run db:push --filter=@ebizmate/db 2>/dev/null || \
              echo "⚠️ DB migration skipped (container not yet built)"

            # Rebuild the production API image
            docker compose -f docker-compose.prod.yml build

            # Restart the services
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images to save disk space
            docker image prune -f

            echo "✅ Deployment complete"
